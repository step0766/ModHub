<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本地模型库</title>
  <link rel="icon" href="/static/imgs/fav.ico" sizes="any">
  <link rel="icon" type="image/png" href="/static/imgs/fav.png">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- CSS Files -->
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/components.css?v=1.3">
  <link rel="stylesheet" href="/static/css/gallery.css?v=1.3">
  <link rel="stylesheet" href="/static/css/manual_import.css?v=5.6">
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <h1><i class="fas fa-cube"></i> 本地模型库</h1>
      </div>

      <!-- Header Search with Reset -->
      <div class="header-search">
        <div class="search-box">
          <i class="fas fa-search search-box__icon"></i>
          <input type="text" id="kw" class="search-box__input" placeholder="搜索模型名称或标签..." autocomplete="off" />
          <button class="search-box__clear" type="button" id="clearBtn" aria-label="清除搜索">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <button id="resetSearchBtn" class="btn-ghost" title="重置所有条件" style="margin-left:8px;">
          <i class="fas fa-undo"></i> 重置
        </button>
      </div>

      <div class="header-actions">
        <button id="themeToggleBtn" class="btn btn-theme-toggle" type="button" title="切换主题">
          <i class="fas fa-sun theme-icon-light"></i>
          <i class="fas fa-moon theme-icon-dark"></i>
        </button>
        <div class="dropdown">
          <button class="btn btn-secondary dropdown-toggle" type="button" id="importDropdownBtn" aria-expanded="false">
            <i class="fas fa-upload"></i> 手动导入
            <i class="fas fa-chevron-down" style="margin-left:6px;font-size:10px;"></i>
          </button>
          <div class="dropdown-menu" id="importDropdownMenu">
            <button class="dropdown-item" type="button" data-manual-import-open>
              <i class="fas fa-file-import"></i> 单模型导入
            </button>
            <button class="dropdown-item" type="button" id="batchFolderImportBtn">
              <i class="fas fa-folder-open"></i> 文件夹导入
            </button>
          </div>
        </div>
        <a class="btn btn-primary" href="/config">
          <i class="fas fa-cog"></i> 配置
        </a>
      </div>
    </header>

    <div class="layout">
      <!-- Vertical Sidebar -->
      <aside class="sidebar">
        <!-- Mobile toggle button -->
        <div class="sidebar-toggle-mobile" id="sidebarToggleMobile">
          <span class="toggle-text">
            <i class="fas fa-filter"></i>
            <span>筛选与分类</span>
            <span class="toggle-hint">点击展开</span>
          </span>
          <span class="toggle-icon">
            <i class="fas fa-chevron-down"></i>
          </span>
        </div>
        
        <!-- Sidebar content wrapper -->
        <div class="sidebar-content">
          <!-- Source Group with Toggle Button -->
          <div class="sidebar-header">
            <div class="side-title source-title"><i class="fas fa-globe"></i> 来源</div>
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="切换侧边栏">
              <i class="fas fa-chevron-left"></i>
            </button>
          </div>
          <div id="sourceMenu" class="side-menu">
            <!-- JS will populate -->
          </div>

          <!-- Filter Group -->
          <div class="side-title filter-title"><i class="fas fa-filter"></i> 筛选</div>
          <div class="side-menu">
            <button class="side-item" type="button" id="favOnlyBtn">
              <span><i class="far fa-heart"></i> 只看收藏</span>
            </button>
            <button class="side-item" type="button" id="printedOnlyBtn">
              <span><i class="far fa-check-circle"></i> 只看已打印</span>
            </button>
          </div>

          <!-- Tags Group -->
          <div class="side-title tag-title"><i class="fas fa-tags"></i> 分类</div>
          <div id="filterChips" class="side-menu tag-list">
            <!-- JS will populate vertical items -->
          </div>

          <!-- Authors Group -->
          <div class="side-title author-title"><i class="fas fa-user"></i> 作者</div>
          <div id="authorChips" class="side-menu">
            <!-- JS will populate vertical items -->
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="content">
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="toolbar-count">共 <span id="totalCount">0</span> 个模型</div>
          <div style="display:flex; align-items:center; gap:12px;">
            <div class="sort-order">
              <label>排序</label>
              <select id="sortOrder">
                <option value="collected" selected>采集时间倒序</option>
                <option value="published">发布时间倒序</option>
                <option value="similarity">模型相似度倒序</option>
              </select>
            </div>
            <div id="multiSelectMode" style="display:none; align-items:center; gap:8px;">
              <span>已选择 <span id="selectedCount">0</span> 个</span>
              <button class="btn btn-danger" id="batchDeleteBtn" onclick="batchDeleteSelected()">
                <i class="fas fa-trash-alt"></i> 删除
              </button>
            </div>
            <button class="btn btn-secondary" id="multiSelectBtn" onclick="toggleMultiSelectMode()">
              <i class="fas fa-check-square"></i> 多选
            </button>
          </div>
        </div>

        <!-- Grid -->
        <div id="grid" class="grid" role="list"></div>

        <div id="empty" class="muted" style="display:none;">暂无模型数据</div>
      </main>
    </div>

    <div id="filterModal" class="filter-modal" style="display:none;" aria-hidden="true">
      <div class="filter-modal__inner" role="dialog" aria-modal="true" aria-labelledby="filterModalTitle">
        <div class="filter-modal__header">
          <div id="filterModalTitle" class="filter-modal__title">全部分类</div>
          <button class="filter-modal__close" type="button" aria-label="关闭">×</button>
        </div>
        <div class="filter-modal__body">
          <div id="filterModalChips" class="filter-modal__chips"></div>
        </div>
      </div>
    </div>

    <!-- Lightbox / modal for image preview -->
    <div id="lightbox" class="lightbox" style="display:none;" aria-hidden="true">
      <div class="lightbox-inner" role="dialog" aria-modal="true">
        <button class="lightbox-close" aria-label="关闭">✖</button>
        <button class="lightbox-prev" aria-label="上一张">◀</button>
        <img id="lightbox-img" alt="预览图片">
        <div id="lightbox-caption" class="lightbox-caption"></div>
        <button class="lightbox-next" aria-label="下一张">▶</button>
      </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" class="confirm-modal" style="display:none;" aria-hidden="true">
      <div class="confirm-modal__inner" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div class="confirm-modal__header">
          <div id="confirmModalTitle" class="confirm-modal__title">确认操作</div>
        </div>
        <div class="confirm-modal__body">
          <div id="confirmModalMessage" class="confirm-modal__message"></div>
        </div>
        <div class="confirm-modal__footer">
          <button id="confirmModalCancel" class="confirm-modal__btn confirm-modal__btn--cancel" type="button">取消</button>
          <button id="confirmModalConfirm" class="confirm-modal__btn confirm-modal__btn--confirm" type="button">确定</button>
        </div>
      </div>
    </div>

  </div>
  <div id="manualImportModal" class="manual-modal" aria-hidden="true">
    <div class="manual-modal__inner" role="dialog" aria-modal="true" aria-labelledby="manualImportTitle">
      <div class="manual-modal__header">
        <div id="manualImportTitle" class="manual-modal__title">单模型导入</div>
        <button class="manual-modal__close" type="button" data-manual-import-close>×</button>
      </div>
      <form id="manualImportForm" class="manual-form">
        <input type="hidden" name="draft_session_id" id="manualDraftSessionId">
        <input type="hidden" name="draft_instance_overrides" id="manualDraftOverrides">
        <div class="manual-row manual-smart-row">
          <label>智能识别 3MF (可多选打印配置文件)</label>
          <div class="manual-inline">
            <input type="file" id="manual3mfPicker" accept=".3mf" multiple>
            <button class="manual-btn" type="button" id="manualParse3mf">识别并填充</button>
          </div>
          <div id="manualParsedPreview" class="manual-draft-preview hidden">
            <div class="manual-draft-head">
              <img id="manualDraftCover" class="manual-draft-cover" alt="cover">
              <div class="manual-draft-meta">
                <div id="manualDraftTitle" class="manual-draft-title"></div>
                <div id="manualDraftDesigner" class="manual-draft-designer"></div>
              </div>
            </div>
            <div class="manual-draft-extra">
              <div>
                <div class="manual-draft-extra-title">识别到的设计图片</div>
                <div class="manual-draft-gallery" id="manualDraftDesignList"></div>
              </div>
              <div>
                <div class="manual-draft-extra-title">识别到的附件</div>
                <div class="manual-draft-files" id="manualDraftAttachmentList"></div>
              </div>
            </div>
            <div class="manual-draft-instances" id="parsedInstanceList"></div>
          </div>
        </div>
        <div class="manual-grid">
          <div>
            <label>模型名称</label>
            <input type="text" name="title" required>
          </div>
          <div>
            <label>模型地址</label>
            <input type="text" name="modelLink" placeholder="https://example.com/model">
          </div>
          <div>
            <label>模型来源</label>
            <input type="text" name="sourceLink" placeholder="https://example.com">
          </div>
        </div>
        <div class="manual-row">
          <label>模型介绍</label>
          <div class="manual-rich-toolbar" role="toolbar" aria-label="模型介绍编辑器">
            <button class="manual-rich-btn" type="button" data-rich-cmd="bold"><b>B</b></button>
            <button class="manual-rich-btn" type="button" data-rich-cmd="italic"><i>I</i></button>
            <button class="manual-rich-btn" type="button" data-rich-cmd="underline"><u>U</u></button>
            <button class="manual-rich-btn" type="button" data-rich-cmd="insertUnorderedList">• 列表</button>
            <button class="manual-rich-btn" type="button" data-rich-cmd="insertOrderedList">1. 列表</button>
            <button class="manual-rich-btn" type="button" data-rich-cmd="formatBlock"
              data-rich-value="blockquote">引用</button>
            <button class="manual-rich-btn" type="button" data-rich-cmd="removeFormat">清除格式</button>
          </div>
          <div id="manualSummaryEditor" class="manual-rich-editor" contenteditable="true" data-placeholder="填写模型介绍...">
          </div>
          <input type="hidden" name="summary" id="manualSummaryText">
          <textarea name="summary_html" id="manualSummaryHtml" hidden></textarea>
          <div class="manual-help">支持加粗、斜体、列表、引用；保存时会同时保留富文本和纯文本</div>
        </div>
        <div class="manual-row">
          <label>标签 (空格分隔)</label>
          <input type="text" name="tags" placeholder="配件 打印支架 原创">
        </div>
        <div class="manual-row">
          <label>封面图片</label>
          <input type="file" name="cover" accept="image/*">
        </div>
        <div class="manual-row">
          <label>设计图片 (多选)</label>
          <input type="file" name="design_images" accept="image/*" multiple>
        </div>
        <div class="manual-row">
          <label>实例文件</label>
          <div class="manual-inline">
            <button class="manual-btn" type="button" id="manualAddInstance">添加实例文件</button>
            <button class="manual-btn" type="button" id="manualParseInstances">识别实例信息</button>
            <span class="manual-help">可多次添加</span>
          </div>
          <input type="file" id="manualInstancePicker" accept=".3mf" multiple style="display:none">
          <div id="instanceDescList" class="file-desc-list"></div>
        </div>
        <div class="manual-row">
          <label>附件文件 (多选)</label>
          <input type="file" name="attachments" multiple>
        </div>
        <div class="manual-actions">
          <button class="manual-btn" type="button" data-manual-import-close>取消</button>
          <button class="manual-btn primary" type="submit" id="manualImportSubmit">保存</button>
        </div>
        <div class="manual-msg" id="manualImportMsg"></div>
      </form>
    </div>
  </div>
  <div id="batchFolderModal" class="manual-modal" aria-hidden="true">
    <div class="batch-modal__inner" role="dialog" aria-modal="true" aria-labelledby="batchFolderTitle">
      <div class="batch-modal__header">
        <div id="batchFolderTitle" class="batch-modal__title">
          <i class="fas fa-folder-open"></i>
          <span>批量文件夹导入</span>
        </div>
        <button class="batch-modal__close" type="button" data-batch-folder-close>
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="batch-modal__body">
        <div id="batchDropZone" class="batch-drop-zone" style="position:relative;">
          <div id="batchParsingOverlay" class="batch-parsing-overlay hidden">
            <div class="batch-parsing-spinner"></div>
            <div class="batch-parsing-text">正在解析 3MF 文件</div>
            <div id="batchParsingDetail" class="batch-parsing-detail">请稍候...</div>
            <div class="batch-parsing-progress">
              <div id="batchParsingProgressBar" class="batch-parsing-progress-bar indeterminate"></div>
            </div>
          </div>
          <div class="batch-drop-zone__content">
            <i class="fas fa-cloud-upload-alt"></i>
            <div class="batch-drop-zone__text">拖放文件夹到此处</div>
            <div class="batch-drop-zone__hint">支持同时拖放多个包含 .3mf 文件的文件夹</div>
          </div>
        </div>
        <div id="batchFolderPreview" class="batch-folder-preview hidden">
          <div class="batch-preview__header">
            <div class="batch-preview__stats">
              <span class="batch-stat"><i class="fas fa-cube"></i> <strong id="batchFolderCount">0</strong> 个模型</span>
              <span class="batch-stat"><i class="fas fa-file"></i> <strong id="batchModelCount">0</strong> 个文件</span>
            </div>
            <button class="manual-btn" type="button" id="batchClearFoldersBtn">
              <i class="fas fa-trash"></i> 清空
            </button>
          </div>
          <div id="batchImportProgress" class="batch-import-progress hidden">
            <div class="batch-progress-bar">
              <div id="batchProgressBar" class="batch-progress-fill"></div>
            </div>
            <div id="batchProgressText" class="batch-progress-text"></div>
          </div>
          <div id="batchFolderList" class="batch-folder-list"></div>
          <div class="batch-folder-actions">
            <button class="manual-btn" type="button" data-batch-folder-close>取消</button>
            <button class="manual-btn primary" type="button" id="batchImportSubmit" disabled>
              <i class="fas fa-check"></i> 开始导入
            </button>
          </div>
        </div>
      </div>
      <input type="file" id="batchFolderPicker" webkitdirectory multiple style="display:none">
    </div>
  </div>
  <script src="/static/js/gallery.js?v=5.2" defer></script>
  <script src="/static/js/manual_import.js?v=5.8" defer></script>
  /body>

</html>
