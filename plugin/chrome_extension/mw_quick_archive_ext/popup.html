<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>归档助手</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <h1>MakerWorld 归档助手</h1>
    <button id="archiveBtn" class="btn main">归档当前模型</button>

    <label class="label" for="apiBase">后端 API 地址</label>
    <input id="apiBase" class="input" type="text" placeholder="http://127.0.0.1:8000" />
    <div class="row">
      <button id="saveBtn" class="btn primary">保存地址</button>
      <button id="testConnBtn" class="btn">测试连接</button>
    </div>
    <div class="row">
      <button id="syncCookieBtn" class="btn">同步 Cookie</button>
      <button id="openHomeBtn" class="btn home">本地模型主页</button>
    </div>
    <div class="row">
      <button id="openLocalBtn" class="btn success" disabled>打开本地模型</button>
    </div>
    <pre id="status" class="status">准备就绪</pre>
  </div>
  <script src="popup.js"></script>
</body>
</html>
